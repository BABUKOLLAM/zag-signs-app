<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZAG SIGNS ERP — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0F1629 0%, #1E1B4B 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 44px 40px;
      text-align: center;
      max-width: 380px;
      width: 100%;
      backdrop-filter: blur(12px);
    }
    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px; font-weight: 900; color: white;
    }
    h1 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    p { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.65; }
    .retry {
      margin-top: 28px; width: 100%;
      background: linear-gradient(135deg, #4F46E5, #7C3AED);
      color: #fff; font-size: 14px; font-weight: 600;
      padding: 13px; border-radius: 12px;
      border: none; cursor: pointer; transition: opacity 0.2s;
    }
    .retry:hover { opacity: 0.9; }
    .badge {
      display: inline-block; margin-top: 24px;
      color: rgba(255,255,255,0.25); font-size: 11px; letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Z</div>
    <h1>You're offline</h1>
    <p>ZAG SIGNS ERP needs an internet connection to load live data. Please check your network and try again.</p>
    <button class="retry" onclick="window.location.reload()">↻ &nbsp;Retry Connection</button>
    <p class="badge">ZAG SIGNS ENTERPRISE ERP</p>
  </div>
</body>
</html>
